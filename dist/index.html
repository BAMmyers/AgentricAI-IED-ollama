import type { AgentPool } from './agents';

export class AgentricOrchestrator {
  private pool: AgentPool;
  private activeWorkflows: Map<string, Workflow> = new Map();

  constructor(pool: AgentPool) {
    this.pool = pool;
  }

  async initialize(): Promise<void> {
    console.log('[AgentricAI] Initializing orchestrator...');
    console.log('[AgentricAI] Default model: AgentricAIcody');
    await this.pool.warmup();
    console.log('[AgentricAI] Ready.');
  }

  async createWorkflow(config: any): Promise<Workflow> {
    const workflow: Workflow = {
      id: crypto.randomUUID(),
      name: config.name,
      steps: config.steps.map((s: any) => ({
        id: crypto.randomUUID(),
        ...s,
        status: 'pending',
      })),
      status: 'idle',
      createdAt: Date.now(),
    };
    this.activeWorkflows.set(workflow.id, workflow);
    return workflow;
  }

  async execute(workflow: Workflow): Promise<void> {
    workflow.status = 'running';
    for (const step of workflow.steps) {
      step.status = 'running';
      const agent = this.pool.getAgent(step.agentId);
      if (agent) {
        step.output = await agent.run(step.instruction);
        step.status = 'completed';
      } else {
        step.status = 'failed';
      }
    }
    workflow.status = 'completed';
  }
}`},{name:"agents.ts",path:"/agentric-project/src/agents.ts",type:"file",language:"typescript",content:`export interface AgentConfig {
  name: string;
  role: string;
  model: string;
  systemPrompt: string;
}

export class Agent {
  config: AgentConfig;

  constructor(config: AgentConfig) {
    this.config = config;
  }

  async run(instruction: string): Promise<string> {
    // Connect to Ollama for local inference
    // Default model: AgentricAIcody
    const response = await fetch('http://localhost:11434/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: this.config.model,
        prompt: instruction,
        system: this.config.systemPrompt,
        stream: false,
      }),
    });
    const data = await response.json();
    return data.response;
  }
}

export class AgentPool {
  private agents: Map<string, Agent> = new Map();

  register(id: string, config: AgentConfig): void {
    this.agents.set(id, new Agent(config));
  }

  getAgent(id: string): Agent | undefined {
    return this.agents.get(id);
  }

  async warmup(): Promise<void> {
    console.log(\`[Pool] Warming up \${this.agents.size} agents...\`);
  }
}`},{name:"types.ts",path:"/agentric-project/src/types.ts",type:"file",language:"typescript",content:`export interface Workflow {

}`}]},{name:"config",path:"/agentric-project/config",type:"folder",children:[{name:"agents.yaml",path:"/agentric-project/config/agents.yaml",type:"file",language:"yaml",content:`# AgentricAI Agent Configuration

|-------|------|----------|

| qwen2.5-coder | Coding | Alternative code specialist |
| dolphin-llama3 | General | Research & writing |
| CrimsonDragonX7/Luna | General | Creative tasks |
| glm-4.7-flash | Fast | Quick inference |

2. Pull default model: \`ollama pull AgentricAIcody\`
3. Run: \`npm start\`

- **Workflows**: Chainable agent task sequences
