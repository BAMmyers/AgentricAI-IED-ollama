-- Collective Consciousness: Real-world, factual, operational data
CREATE TABLE IF NOT EXISTS collective_memory (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    key TEXT NOT NULL UNIQUE,
    value TEXT NOT NULL,
    category TEXT DEFAULT 'general',
    source_agent TEXT,
    confidence REAL DEFAULT 1.0,
    access_count INTEGER DEFAULT 0,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    expires_at DATETIME NULL
);

-- Simulated Consciousness: Synthetic and generated data
CREATE TABLE IF NOT EXISTS simulated_memory (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    key TEXT NOT NULL UNIQUE,
    value TEXT NOT NULL,
    simulation_type TEXT DEFAULT 'test',
    parameters TEXT,
    source_agent TEXT,
    is_validated INTEGER DEFAULT 0,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Theoretical Consciousness: Abstract, creative, conceptual data
CREATE TABLE IF NOT EXISTS theoretical_memory (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    key TEXT NOT NULL UNIQUE,
    value TEXT NOT NULL,
    concept_type TEXT DEFAULT 'idea',
    related_concepts TEXT,
    maturity_level TEXT DEFAULT 'nascent',
    source_agent TEXT,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Conversations
CREATE TABLE IF NOT EXISTS conversations (
    id TEXT PRIMARY KEY,
    agent_id TEXT NOT NULL,
    agent_name TEXT NOT NULL,
    model TEXT NOT NULL,
    started_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    last_message_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    message_count INTEGER DEFAULT 0,
    context_summary TEXT,
    is_archived INTEGER DEFAULT 0
);

-- Messages
CREATE TABLE IF NOT EXISTS messages (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    conversation_id TEXT NOT NULL,
    role TEXT NOT NULL,
    content TEXT NOT NULL,
    tokens INTEGER DEFAULT 0,
    thinking_time_ms INTEGER DEFAULT 0,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Workflow outputs
CREATE TABLE IF NOT EXISTS workflow_outputs (
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    type TEXT NOT NULL,
    agents_used TEXT NOT NULL,
    mission TEXT,
    result TEXT NOT NULL,
    execution_time_ms INTEGER,
    success INTEGER DEFAULT 1,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Custom agents
CREATE TABLE IF NOT EXISTS custom_agents (
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    role TEXT NOT NULL,
    category TEXT DEFAULT 'Custom',
    model TEXT NOT NULL,
    system_prompt TEXT,
    tools TEXT,
    temperature REAL DEFAULT 0.7,
    max_tokens INTEGER DEFAULT 2048,
    logic TEXT DEFAULT 'local',
    color TEXT DEFAULT '#06b6d4',
    is_active INTEGER DEFAULT 1,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Saved teams
CREATE TABLE IF NOT EXISTS saved_teams (
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    description TEXT,
    agent_ids TEXT NOT NULL,
    default_mission TEXT,
    use_count INTEGER DEFAULT 0,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Settings
CREATE TABLE IF NOT EXISTS settings (
    key TEXT PRIMARY KEY,
    value TEXT NOT NULL,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Knowledge base
CREATE TABLE IF NOT EXISTS knowledge_base (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    title TEXT NOT NULL,
    content TEXT NOT NULL,
    content_type TEXT DEFAULT 'text',
    tags TEXT,
    source TEXT,
    embedding_id TEXT,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
    updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Agent feedback
CREATE TABLE IF NOT EXISTS agent_feedback (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    agent_id TEXT NOT NULL,
    conversation_id TEXT,
    feedback_type TEXT NOT NULL,
    original_response TEXT,
    corrected_response TEXT,
    notes TEXT,
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Indexes
CREATE INDEX IF NOT EXISTS idx_collective_category ON collective_memory(category);
CREATE INDEX IF NOT EXISTS idx_messages_conversation ON messages(conversation_id);
CREATE INDEX IF NOT EXISTS idx_conversations_agent ON conversations(agent_id);

-- Default settings
INSERT OR IGNORE INTO settings (key, value) VALUES ('db_version', '1.0');
INSERT OR IGNORE INTO settings (key, value) VALUES ('verbose_mode', 'false');
INSERT OR IGNORE INTO settings (key, value) VALUES ('default_model', 'AgentricAIcody');
INSERT OR IGNORE INTO settings (key, value) VALUES ('auto_save_conversations', 'true');

import type { AgentPool } from './agents';

export class AgentricOrchestrator {
  private pool: AgentPool;
  private activeWorkflows: Map<string, Workflow> = new Map();

  constructor(pool: AgentPool) {
    this.pool = pool;
  }

  async initialize(): Promise<void> {
    console.log('[AgentricAI] Initializing orchestrator...');
    console.log('[AgentricAI] Default model: AgentricAIcody');
    await this.pool.warmup();
    console.log('[AgentricAI] Ready.');
  }

  async createWorkflow(config: any): Promise<Workflow> {
    const workflow: Workflow = {
      id: crypto.randomUUID(),
      name: config.name,
      steps: config.steps.map((s: any) => ({
        id: crypto.randomUUID(),
        ...s,
        status: 'pending',
      })),
      status: 'idle',
      createdAt: Date.now(),
    };
    this.activeWorkflows.set(workflow.id, workflow);
    return workflow;
  }

  async execute(workflow: Workflow): Promise<void> {
    workflow.status = 'running';
    for (const step of workflow.steps) {
      step.status = 'running';
      const agent = this.pool.getAgent(step.agentId);
      if (agent) {
        step.output = await agent.run(step.instruction);
        step.status = 'completed';
      } else {
        step.status = 'failed';
      }
    }
    workflow.status = 'completed';
  }
}`},{name:"agents.ts",path:"/agentric-project/src/agents.ts",type:"file",language:"typescript",content:`export interface AgentConfig {
  name: string;
  role: string;
  model: string;
  systemPrompt: string;
}

export class Agent {
  config: AgentConfig;

  constructor(config: AgentConfig) {
    this.config = config;
  }

  async run(instruction: string): Promise<string> {
    // Connect to Ollama for local inference
    // Default model: AgentricAIcody
    const response = await fetch('http://localhost:11434/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: this.config.model,
        prompt: instruction,
        system: this.config.systemPrompt,
        stream: false,
      }),
    });
    const data = await response.json();
    return data.response;
  }
}

export class AgentPool {
  private agents: Map<string, Agent> = new Map();

  register(id: string, config: AgentConfig): void {
    this.agents.set(id, new Agent(config));
  }

  getAgent(id: string): Agent | undefined {
    return this.agents.get(id);
  }

  async warmup(): Promise<void> {
    console.log(\`[Pool] Warming up \${this.agents.size} agents...\`);
  }
}`},{name:"types.ts",path:"/agentric-project/src/types.ts",type:"file",language:"typescript",content:`export interface Workflow {
