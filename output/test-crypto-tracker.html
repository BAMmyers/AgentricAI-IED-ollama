<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberCrypto Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /**
     * CyberCrypto Portfolio Tracker - Cyberpunk Theme
     * Generated by AgentricAI Hive Mind
     * Agents: TheAlchemist, Visualizer, SnippetCoder
     */
    
    :root {
      --bg-void: #0a0a0f;
      --bg-dark: #12121a;
      --bg-card: #1a1a25;
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff00ff;
      --neon-green: #39ff14;
      --neon-red: #ff3366;
      --neon-yellow: #ffff00;
      --text-primary: #ffffff;
      --text-secondary: #8888aa;
      --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.5);
      --glow-magenta: 0 0 20px rgba(255, 0, 255, 0.5);
      --glow-green: 0 0 15px rgba(57, 255, 20, 0.5);
      --glow-red: 0 0 15px rgba(255, 51, 102, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-void);
      background-image: 
        radial-gradient(ellipse at 50% 0%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, var(--bg-void) 0%, #0d0d15 100%);
      min-height: 100vh;
      font-family: 'JetBrains Mono', 'Segoe UI', monospace;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Scanline effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.1) 2px,
        rgba(0, 0, 0, 0.1) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      font-size: 2.5rem;
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.95); }
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .accent {
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
    }

    .pulse-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--neon-green);
      border-radius: 50%;
      box-shadow: var(--glow-green);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0.3; }
    }

    /* Portfolio Summary */
    .portfolio-summary {
      background: linear-gradient(135deg, var(--bg-card), rgba(0, 240, 255, 0.03));
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 1rem;
      padding: 2.5rem;
      text-align: center;
      margin-bottom: 2rem;
      box-shadow: var(--glow-cyan), inset 0 0 60px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .portfolio-summary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
      animation: scanline 3s linear infinite;
    }

    @keyframes scanline {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .summary-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .summary-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
      margin: 1rem 0;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 0.95; }
      94% { opacity: 0.85; }
      96% { opacity: 1; }
      98% { opacity: 0.9; }
    }

    .summary-change {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 500;
    }

    .summary-change.positive {
      background: rgba(57, 255, 20, 0.1);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: var(--neon-green);
    }

    .summary-change.negative {
      background: rgba(255, 51, 102, 0.1);
      border: 1px solid rgba(255, 51, 102, 0.3);
      color: var(--neon-red);
    }

    .change-icon {
      font-size: 1.2rem;
    }

    /* Crypto Grid */
    .crypto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .crypto-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .crypto-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      opacity: 0.7;
    }

    .crypto-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(0, 240, 255, 0.03));
      pointer-events: none;
    }

    .crypto-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan), 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .crypto-icon {
      font-size: 2.5rem;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 255, 0.1));
      border-radius: 50%;
      border: 1px solid rgba(0, 240, 255, 0.3);
    }

    .crypto-name h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .crypto-name .symbol {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price-row .label {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .price-row .value {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .price-row.total {
      padding-top: 0.75rem;
      margin-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .price-row.total .value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: var(--neon-cyan);
    }

    .price-row.profit .value {
      font-weight: 600;
    }

    .positive { color: var(--neon-green); text-shadow: var(--glow-green); }
    .negative { color: var(--neon-red); text-shadow: var(--glow-red); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .footer .last-updated {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .footer .update-dot {
      width: 6px;
      height: 6px;
      background: var(--neon-cyan);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    /* Price update flash animation */
    .price-flash {
      animation: flash 0.5s ease-out;
    }

    @keyframes flash {
      0% { background: rgba(0, 240, 255, 0.3); }
      100% { background: transparent; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app-container {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .logo-text {
        font-size: 1.4rem;
      }

      .summary-value {
        font-size: 2.5rem;
      }

      .crypto-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-secondary);
    }

    .loading::after {
      content: '';
      width: 30px;
      height: 30px;
      border: 2px solid var(--neon-cyan);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <h1 class="logo-text">CYBER<span class="accent">CRYPTO</span></h1>
      </div>
      <div class="pulse-indicator">
        <span class="pulse-dot"></span>
        <span>LIVE DATA</span>
      </div>
    </header>
    
    <main class="main-content">
      <section class="portfolio-summary" id="portfolioSummary">
        <div class="summary-label">TOTAL PORTFOLIO VALUE</div>
        <div class="summary-value" id="totalValue">$0.00</div>
        <div class="summary-change positive" id="totalChange">
          <span class="change-icon">↑</span>
          <span class="change-percent">0.00%</span>
          <span class="change-amount">($0.00)</span>
        </div>
      </section>
      
      <section class="crypto-grid" id="cryptoGrid">
        <div class="loading">Initializing portfolio</div>
      </section>
    </main>
    
    <footer class="footer">
      <div class="last-updated">
        <span class="update-dot"></span>
        Last updated: <span id="lastUpdate">--:--:--</span>
      </div>
      <div style="margin-top: 0.5rem; opacity: 0.5;">
        Generated by AgentricAI Hive Mind
      </div>
    </footer>
  </div>

  <script>
    /**
     * CyberCrypto Portfolio Tracker - JavaScript Module
     * Generated by AgentricAI Hive Mind
     * Agents: JSONDataGenerator, DataConnector, Bug
     * 
     * Features:
     * - Real-time price simulation
     * - Profit/Loss calculations
     * - Animated price updates
     */

    // Mock cryptocurrency data
    const cryptoData = {
      holdings: [
        {
          id: 'btc',
          name: 'Bitcoin',
          symbol: 'BTC',
          amount: 0.5,
          purchasePrice: 42000,
          currentPrice: 67500,
          priceChange24h: 2.4,
          icon: '₿'
        },
        {
          id: 'eth',
          name: 'Ethereum',
          symbol: 'ETH',
          amount: 4.2,
          purchasePrice: 2800,
          currentPrice: 3450,
          priceChange24h: -1.2,
          icon: 'Ξ'
        },
        {
          id: 'sol',
          name: 'Solana',
          symbol: 'SOL',
          amount: 25,
          purchasePrice: 95,
          currentPrice: 142,
          priceChange24h: 5.8,
          icon: '◎'
        },
        {
          id: 'ada',
          name: 'Cardano',
          symbol: 'ADA',
          amount: 1500,
          purchasePrice: 0.45,
          currentPrice: 0.62,
          priceChange24h: -0.8,
          icon: '₳'
        }
      ]
    };

    // Portfolio Calculator Module
    const Portfolio = {
      data: null,
      updateInterval: null,
      
      /**
       * Initialize the portfolio with data
       * @param {Object} data - Cryptocurrency holdings data
       */
      init(data) {
        // Null check for safety (Bug agent recommendation)
        if (!data || !data.holdings) {
          console.error('[Portfolio] Invalid data provided');
          return;
        }
        
        this.data = data;
        this.render();
        this.startLiveUpdates();
        console.log('[Portfolio] Initialized with', data.holdings.length, 'holdings');
      },
      
      /**
       * Calculate total portfolio value
       * @returns {number} Total value in USD
       */
      calculatePortfolioValue() {
        return this.data.holdings.reduce((total, crypto) => {
          return total + (crypto.amount * crypto.currentPrice);
        }, 0);
      },
      
      /**
       * Calculate total cost basis
       * @returns {number} Total cost in USD
       */
      calculateTotalCost() {
        return this.data.holdings.reduce((total, crypto) => {
          return total + (crypto.amount * crypto.purchasePrice);
        }, 0);
      },
      
      /**
       * Calculate profit/loss
       * @returns {Object} Amount and percentage
       */
      calculateProfitLoss() {
        const currentValue = this.calculatePortfolioValue();
        const totalCost = this.calculateTotalCost();
        return {
          amount: currentValue - totalCost,
          percentage: ((currentValue - totalCost) / totalCost) * 100
        };
      },
      
      /**
       * Format number as currency
       * @param {number} value - Value to format
       * @returns {string} Formatted currency string
       */
      formatCurrency(value) {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: 'USD',
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(value);
      },
      
      /**
       * Format number with appropriate decimal places
       * @param {number} value - Value to format
       * @returns {string} Formatted number
       */
      formatNumber(value) {
        if (value >= 1) {
          return value.toFixed(2);
        } else if (value >= 0.01) {
          return value.toFixed(4);
        } else {
          return value.toFixed(6);
        }
      },
      
      /**
       * Render the entire portfolio UI
       */
      render() {
        // Update portfolio summary
        const totalValue = this.calculatePortfolioValue();
        const profitLoss = this.calculateProfitLoss();
        
        const totalValueEl = document.getElementById('totalValue');
        totalValueEl.textContent = this.formatCurrency(totalValue);
        
        const changeEl = document.getElementById('totalChange');
        const isPositive = profitLoss.amount >= 0;
        changeEl.innerHTML = `
          <span class="change-icon">${isPositive ? '↑' : '↓'}</span>
          <span class="change-percent">${Math.abs(profitLoss.percentage).toFixed(2)}%</span>
          <span class="change-amount">(${this.formatCurrency(Math.abs(profitLoss.amount))})</span>
        `;
        changeEl.className = `summary-change ${isPositive ? 'positive' : 'negative'}`;
        
        // Render crypto cards
        const grid = document.getElementById('cryptoGrid');
        grid.innerHTML = this.data.holdings.map(crypto => this.renderCard(crypto)).join('');
        
        // Update timestamp
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
      },
      
      /**
       * Render a single crypto card
       * @param {Object} crypto - Cryptocurrency data
       * @returns {string} HTML string
       */
      renderCard(crypto) {
        const value = crypto.amount * crypto.currentPrice;
        const cost = crypto.amount * crypto.purchasePrice;
        const profit = value - cost;
        const profitPercent = ((value - cost) / cost) * 100;
        const isPositive24h = crypto.priceChange24h >= 0;
        const isProfitable = profit >= 0;
        
        return `
          <article class="crypto-card" data-id="${crypto.id}">
            <div class="card-header">
              <span class="crypto-icon">${crypto.icon}</span>
              <div class="crypto-name">
                <h3>${crypto.name}</h3>
                <span class="symbol">${crypto.symbol}</span>
              </div>
            </div>
            <div class="card-body">
              <div class="price-row">
                <span class="label">Price</span>
                <span class="value" data-field="price">${this.formatCurrency(crypto.currentPrice)}</span>
              </div>
              <div class="price-row">
                <span class="label">24h Change</span>
                <span class="value ${isPositive24h ? 'positive' : 'negative'}" data-field="change24h">
                  ${isPositive24h ? '+' : ''}${crypto.priceChange24h.toFixed(2)}%
                </span>
              </div>
              <div class="price-row">
                <span class="label">Holdings</span>
                <span class="value">${this.formatNumber(crypto.amount)} ${crypto.symbol}</span>
              </div>
              <div class="price-row total">
                <span class="label">Value</span>
                <span class="value" data-field="value">${this.formatCurrency(value)}</span>
              </div>
              <div class="price-row profit">
                <span class="label">Profit/Loss</span>
                <span class="value ${isProfitable ? 'positive' : 'negative'}" data-field="profit">
                  ${isProfitable ? '+' : ''}${this.formatCurrency(profit)} (${profitPercent.toFixed(1)}%)
                </span>
              </div>
            </div>
          </article>
        `;
      },
      
      /**
       * Start simulated live price updates
       */
      startLiveUpdates() {
        // Clear any existing interval (Bug agent recommendation)
        if (this.updateInterval) {
          clearInterval(this.updateInterval);
        }
        
        this.updateInterval = setInterval(() => {
          // Simulate realistic price fluctuations
          this.data.holdings.forEach(crypto => {
            // Random walk with momentum
            const volatility = crypto.symbol === 'BTC' ? 0.005 : 
                              crypto.symbol === 'ETH' ? 0.008 :
                              crypto.symbol === 'SOL' ? 0.015 : 0.01;
            
            const fluctuation = (Math.random() - 0.5) * 2 * volatility;
            crypto.currentPrice *= (1 + fluctuation);
            
            // Update 24h change slowly
            crypto.priceChange24h += (Math.random() - 0.5) * 0.05;
            crypto.priceChange24h = Math.max(-20, Math.min(20, crypto.priceChange24h));
          });
          
          this.render();
          
          // Add flash animation to indicate update
          document.querySelectorAll('.crypto-card').forEach(card => {
            card.classList.add('price-flash');
            setTimeout(() => card.classList.remove('price-flash'), 500);
          });
          
        }, 3000); // Update every 3 seconds
      },
      
      /**
       * Stop live updates (cleanup)
       */
      stopUpdates() {
        if (this.updateInterval) {
          clearInterval(this.updateInterval);
          this.updateInterval = null;
          console.log('[Portfolio] Live updates stopped');
        }
      }
    };

    // Initialize on DOM load
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[CyberCrypto] Initializing...');
      Portfolio.init(cryptoData);
      console.log('[CyberCrypto] Ready!');
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      Portfolio.stopUpdates();
    });
  </script>
</body>
</html>
